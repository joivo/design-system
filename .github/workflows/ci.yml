name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint CSS
        run: npm run lint

      - name: Validate DESIGN.md
        run: npx --yes @google/design.md lint DESIGN.md

      - name: Build Tailwind plugin
        run: npm run build

      - name: Verify CSS files exist
        run: |
          for f in \
            src/index.css \
            src/tokens/index.css \
            src/utilities/index.css \
            src/animations/index.css \
            src/themes/dark.css \
            src/themes/light.css \
            dist/tailwind-plugin.js \
            dist/tailwind-plugin.d.ts; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "All files present"

      - name: Verify no React artifacts
        run: |
          found=$(find src/ \( -name "*.tsx" -o -name "*.jsx" \) 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "Unexpected React files in src/: $found"
            exit 1
          fi
          echo "Clean: no React files in src/"
